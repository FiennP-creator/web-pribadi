<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fienn-P Creator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins;
  background:#0f2027;
  color:#fff;
}

/* HEADER */
header{
  text-align:center;
  padding:60px 20px;
}
h1{letter-spacing:2px}

/* FILTER */
.filter{
  text-align:center;
  margin-bottom:20px;
}
.filter button{
  margin:5px;
  padding:8px 15px;
  border:none;
  border-radius:20px;
  background:#ffffff20;
  color:white;
  cursor:pointer;
}
.filter button.active{
  background:#00e5ff;
  color:black;
}

/* GRID */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  opacity:0;
  transform:scale(0.9);
  transition:.5s;
}
.card.show{
  opacity:1;
  transform:scale(1);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:15px;
  cursor:pointer;
}

/* WATERMARK */
.watermark{
  position:absolute;
  bottom:8px;
  right:10px;
  font-size:10px;
  background:#0008;
  padding:3px 6px;
  border-radius:5px;
}

/* MODAL */
#modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:black;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#modal img{
  max-width:90%;
  max-height:80%;
}

.nav{
  font-size:30px;
  color:white;
  cursor:pointer;
  padding:10px;
}
</style>
</head>

<body>

<header>
  <h1>Fienn-P Creator</h1>
  <p>Professional Visual Portfolio</p>
</header>

<!-- FILTER -->
<div class="filter">
  <button onclick="filterSelection('all')" class="active">All</button>
  <button onclick="filterSelection('photo')">Photo</button>
  <button onclick="filterSelection('design')">Design</button>
  <button onclick="filterSelection('album')">Album</button>
</div>
<!-- NAVBAR -->
<div style="text-align:center; margin:20px;">
  <a href="index.html" style="margin:10px; color:white;">Home</a>
  <a href="artikel.html" style="margin:10px; color:white;">Artikel</a>
</div>

<!-- GALERI -->
<div class="gallery" id="gallery"></div>

<!-- MODAL -->
<div id="modal">
  <span class="nav" onclick="prev()">⟨</span>
  <img id="modalImg">
  <span class="nav" onclick="next()">⟩</span>
</div>

<script>
let data = [];
let filtered = [];
let index = 0;

// LOAD JSON
fetch('images.json')
.then(res => res.json())
.then(res => {
  data = res;
  filtered = data;
  renderGallery();
});

// RENDER
function renderGallery(){
  let gallery = document.getElementById('gallery');
  gallery.innerHTML = "";

  filtered.forEach((item,i)=>{
    let div = document.createElement('div');
    div.className = "card show";

    div.innerHTML = `
      <div style="position:relative">
        <img loading="lazy" src="images/${item.file}" onclick="openModal(${i})">
        <div class="watermark">@fiennp.creator</div>
      </div>
    `;

    gallery.appendChild(div);
  });
}

// FILTER
function filterSelection(cat){
  document.querySelectorAll('.filter button').forEach(btn=>btn.classList.remove('active'));
  event.target.classList.add('active');

  if(cat === 'all'){
    filtered = data;
  }else{
    filtered = data.filter(i => i.category === cat);
  }

  renderGallery();
}

// MODAL
function openModal(i){
  index = i;
  document.getElementById('modal').style.display='flex';
  document.getElementById('modalImg').src='images/'+filtered[index].file;
}

function next(){
  index = (index+1)%filtered.length;
  document.getElementById('modalImg').src='images/'+filtered[index].file;
}

function prev(){
  index = (index-1+filtered.length)%filtered.length;
  document.getElementById('modalImg').src='images/'+filtered[index].file;
}

document.getElementById('modal').onclick=function(){
  this.style.display='none';
}
</script>

</body>
</html>
