<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artikel - Web Pribadi</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      margin: 0;
      color: white;
    }

    header {
      text-align: center;
      padding: 20px;
    }

    .nav {
      text-align: center;
      margin-bottom: 20px;
    }

    .nav a {
      margin: 10px;
      color: #00e5ff;
      text-decoration: none;
      font-size: 18px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 12px;
      overflow: hidden;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card a {
      text-decoration: none;
      color: white;
      display: block;
    }

    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: block;
    }

    .card-content {
      padding: 15px;
    }

    .card h3 {
      margin: 0 0 10px;
    }

    .card p {
      font-size: 14px;
      color: #cbd5e1;
    }
  </style>
</head>
<body>

<header>
  <h1>Daftar Artikel</h1>
</header>

<div class="nav">
  <a href="index.html">Home</a>
</div>

<div class="container">

  <!-- ARTIKEL 1 -->
  <div class="card">
    <a href="artikel-ai.html">
      <img src="https://images.unsplash.com/photo-1677442136019-21780ecad995">
      <div class="card-content">
        <h3>Perkembangan AI di Masa Depan</h3>
        <p>Bagaimana AI akan mengubah kehidupan manusia di masa depan.</p>
      </div>
    </a>
  </div>

  <!-- ARTIKEL 2 -->
  <div class="card">
    <a href="#">
      <img src="https://source.unsplash.com/400x300/?technology">
      <div class="card-content">
        <h3>Teknologi Modern</h3>
        <p>Perkembangan teknologi terbaru di dunia digital.</p>
      </div>
    </a>
  </div>

  <!-- ARTIKEL 3 -->
  <div class="card">
    <a href="#">
      <img src="https://source.unsplash.com/400x300/?coding">
      <div class="card-content">
        <h3>Belajar Coding</h3>
        <p>Panduan untuk memulai belajar pemrograman dari nol.</p>
      </div>
    </a>
  </div>

</div>

</body>
</html>
