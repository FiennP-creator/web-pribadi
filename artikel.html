<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artikel - Web Pribadi</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      margin: 0;
      color: white;
    }

    header {
      text-align: center;
      padding: 20px;
    }

    .nav {
      text-align: center;
      margin-bottom: 20px;
    }

    .nav a {
      margin: 10px;
      color: #00e5ff;
      text-decoration: none;
      font-size: 18px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 12px;
      overflow: hidden;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card a {
      text-decoration: none;
      color: white;
      display: block;
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-bottom: 2px solid #00e5ff
    }

    .card-content {
      padding: 15px;
    }

    .card h3 {
      margin: 0 0 10px;
    }

    .card p {
      font-size: 14px;
      color: #cbd5e1;
    }
  </style>
</head>
  <script>
fetch('data.json')
  .then(res => res.json())
  .then(data => {
    let container = document.getElementById('listArtikel');

    data.forEach(item => {
      let card = `
        <div class="card">
          <a href="${item.link}">
            <img src="${item.img}">
            <div class="card-content">
              <h3>${item.title}</h3>
              <p>${item.desc}</p>
            </div>
          </a>
        </div>
      `;
      container.innerHTML += card;
    });
  });
  </script>
  <body>

<header>
  <h1>Daftar Artikel</h1>
</header>

<div class="nav">
  <a href="index.html">Home</a>
</div>

<div class="container" id="listArtikel"></div>
